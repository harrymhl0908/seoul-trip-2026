<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>首爾家庭旅行 2026 · 行程</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Space+Mono:wght@400;700&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
/* ============================================================
   Seoul Family Trip — Design System B  (seoul-ds-b.css)
   Müller-Brockmann / Swiss International Typographic Style.
   白底 · 近黑墨 · 單一瑞士紅 accent · grotesque (Inter) + mono (Space Mono)
   模組 grid · 8px baseline · 大數字記號 · hairline 取代填色框 · flush-left
   禁：米色/紙感、藍紫漸變、柔陰影、圓角卡、emoji、Fraunces 斜體。
   字體由各 HTML <link> 載 Google Fonts：Inter / Space Mono / Noto Sans TC。
   ============================================================ */

:root{
  --paper:#FFFFFF; --ink:#111111; --ink-2:#444444; --ink-3:#7A7A7A;
  --red:#E4002B;                 /* canonical Swiss red — 唯一 accent */
  --rule:#DCDCDC; --rule-2:#EAEAEA; --rule-ink:#111111;
  --bl:8px;                       /* baseline unit */
  --lh:24px;                      /* body leading = 3×8 */
  --maxw:880px; --gut:20px;
  --sans:"Inter","Noto Sans TC","PingFang TC",system-ui,sans-serif;
  --mono:"Space Mono","IBM Plex Mono",ui-monospace,Menlo,monospace;
}

*{box-sizing:border-box;margin:0;padding:0;}
html{-webkit-text-size-adjust:100%;}
body{
  font-family:var(--sans); background:var(--paper); color:var(--ink);
  font-size:14.5px; line-height:var(--lh); letter-spacing:0;
  padding:24px 20px 64px; -webkit-font-smoothing:antialiased;
}
.wrap{max-width:var(--maxw);margin:0 auto;}
a{color:var(--ink);text-decoration:none;border-bottom:1px solid var(--ink);}
a:hover{color:var(--red);border-bottom-color:var(--red);}

/* mono label helper — 取代 emoji */
.lbl{font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.12em;
     text-transform:uppercase;color:var(--red);margin-right:8px;}

/* ============ Header / masthead ============ */
.kicker{font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:.2em;
        text-transform:uppercase;color:var(--red);}
.masthead{display:grid;grid-template-columns:auto 1fr;column-gap:24px;align-items:start;
          border-top:2px solid var(--ink);padding-top:12px;margin-top:8px;}
.daynum{font-weight:900;font-size:104px;line-height:.8;letter-spacing:-.045em;color:var(--ink);}
.title{font-weight:800;font-size:clamp(28px,4.6vw,40px);line-height:1.0;letter-spacing:-.022em;margin-top:2px;}
.sub{font-size:14px;line-height:1.5;color:var(--ink-2);max-width:54ch;margin-top:10px;}
.rule{height:0;border-top:2px solid var(--ink);margin:20px 0 0;}
@media(max-width:560px){.daynum{font-size:64px;} .masthead{column-gap:16px;}}

/* callouts — hairline + mono 標籤，非填色 pill */
.callout{display:grid;grid-template-columns:auto 1fr;gap:12px;align-items:baseline;
         padding:10px 0 10px 14px;margin:16px 0;border-left:3px solid var(--red);}
.callout .ct{font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.14em;
             text-transform:uppercase;color:var(--red);white-space:nowrap;}
.callout .cv{font-size:13.5px;line-height:1.5;font-weight:600;}
.callout.info{border-left-color:var(--ink);}
.callout.info .ct{color:var(--ink);}

/* facts — mono data row, hairline ruled, 無 card 底 */
.facts{display:grid;grid-template-columns:repeat(4,1fr);gap:0 var(--gut);
       border-top:1px solid var(--ink);border-bottom:1px solid var(--ink);
       margin:20px 0 4px;padding:10px 0;}
.fact .l{font-family:var(--mono);font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-3);}
.fact .v{font-size:13px;font-weight:700;line-height:1.3;margin-top:3px;}
@media(max-width:560px){.facts{grid-template-columns:repeat(2,1fr);gap:10px var(--gut);}}

/* legend */
.legend{display:flex;flex-wrap:wrap;gap:6px 18px;margin:14px 0 2px;font-size:12px;align-items:center;
        font-family:var(--mono);}
.lg{display:inline-flex;align-items:center;gap:7px;font-weight:700;letter-spacing:.04em;}
.sw{width:11px;height:11px;display:inline-block;}
.lg .ring{width:12px;height:12px;border:2.5px solid var(--ink);border-radius:50%;display:inline-block;}

/* ============ Arrival / transport ribbon (NEW) ============ */
.arrival{margin:22px 0 4px;border-top:1px solid var(--ink);border-bottom:1px solid var(--ink);padding:12px 0;}
.arrival .alabel{font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.16em;
                 text-transform:uppercase;color:var(--red);margin-bottom:10px;}
.arrival .arow{display:grid;grid-template-columns:repeat(5,1fr);gap:16px;}
.acell{border-top:2px solid var(--ink);padding-top:7px;}
.acell .an{font-family:var(--mono);font-size:11px;font-weight:700;color:var(--red);}
.acell .at{font-size:13px;font-weight:700;line-height:1.25;margin-top:3px;}
.acell .at span{display:block;font-weight:400;font-size:11px;color:var(--ink-2);margin-top:2px;}
@media(max-width:560px){.arrival .arow{grid-template-columns:repeat(2,1fr);gap:12px 16px;}}

/* ============ District map ============ */
.districtmap{margin:18px 0 6px;border:1px solid var(--ink);}
.districtmap svg{display:block;width:100%;height:auto;}

/* ============ Timeline ============ */
.timeline{margin-top:20px;}
.zone{margin:26px 0 0;padding:8px 0 7px;border-top:3px solid var(--ink);
      display:flex;align-items:baseline;gap:12px;flex-wrap:wrap;}
.zone .zt{font-weight:900;font-size:17px;letter-spacing:-.01em;text-transform:uppercase;}
.zone .zs{font-family:var(--mono);font-size:11px;color:var(--ink-3);font-weight:400;letter-spacing:.04em;}

/* a stop = grid band: 大數字 | 時間 | 正文 | 相 */
.stop{display:grid;grid-template-columns:58px 92px 1fr 132px;column-gap:var(--gut);
      align-items:start;padding:18px 0 16px;border-bottom:1px solid var(--rule);}
.stop.opt{border-left:0;}
.idx{font-weight:900;font-size:48px;line-height:.82;letter-spacing:-.04em;color:var(--ink);}
.stop.opt .idx{color:var(--red);opacity:.55;}
.when{font-family:var(--mono);font-size:17px;font-weight:700;line-height:1.05;letter-spacing:-.01em;}
.when .cat{display:inline-block;font-size:9.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
           color:var(--red);border:1px solid var(--red);padding:1px 5px;margin-top:8px;}
.when .cat.opt{color:var(--ink-3);border-color:var(--ink-3);}
.main{min-width:0;}
.nm{font-weight:800;font-size:21px;line-height:1.1;letter-spacing:-.012em;}
.usp{font-size:13.5px;line-height:1.5;color:var(--ink-2);margin-top:6px;max-width:52ch;}
.meta{margin-top:9px;display:flex;flex-direction:column;gap:3px;}
.meta .mi{font-size:12.5px;line-height:1.45;color:var(--ink);display:grid;grid-template-columns:58px 1fr;gap:6px;}
.meta .mi .l{font-family:var(--mono);font-size:9.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
             color:var(--ink-3);padding-top:2px;}
.meta .mi b{font-weight:700;}
.resv{font-family:var(--mono);font-size:9.5px;font-weight:700;letter-spacing:.06em;color:#fff;background:var(--red);
      padding:1px 6px;text-transform:uppercase;}
.nav{margin-top:8px;font-family:var(--mono);font-size:11.5px;font-weight:700;letter-spacing:.04em;}
.nav a{border-bottom:1px solid var(--ink);}
.nav a::after{content:" →";color:var(--red);}

/* quote — flush-left hairline, 非填色框 */
.quote{margin-top:10px;padding-left:14px;border-left:2px solid var(--red);
       font-size:13px;line-height:1.5;color:var(--ink);}
.quote .src{display:block;margin-top:3px;font-family:var(--mono);font-size:10.5px;color:var(--ink-3);font-weight:400;letter-spacing:.03em;}

/* 資訊段：mono 標籤 + 文字，hairline 上界，無填色 */
.seg{margin-top:8px;padding-top:7px;border-top:1px solid var(--rule-2);font-size:12.5px;line-height:1.5;color:var(--ink-2);}
.seg b{color:var(--ink);font-weight:700;}
.task{margin-top:9px;font-size:12.5px;line-height:1.45;color:var(--ink);}

/* 相：硬邊、無圓角無陰影、snap 落格 */
.ph{width:132px;height:160px;object-fit:cover;background:var(--rule);filter:grayscale(.12);}
@media(max-width:560px){
  .stop{grid-template-columns:46px 1fr;row-gap:8px;}
  .when{grid-column:2;display:flex;align-items:baseline;gap:10px;}
  .when .cat{margin-top:0;}
  .main{grid-column:1 / -1;}
  .ph{grid-column:1 / -1;width:100%;height:200px;order:5;}
}

/* endnode */
.endnode{display:grid;grid-template-columns:58px 1fr;column-gap:var(--gut);align-items:center;
         margin-top:6px;padding-top:12px;border-top:3px solid var(--ink);}
.endnode .sq{width:18px;height:18px;background:var(--red);}
.endnode .et{font-weight:800;font-size:15px;letter-spacing:-.01em;}

/* ============ Panels / table / avoid ============ */
.panel{margin-top:30px;}
.panel h3{font-weight:900;font-size:15px;letter-spacing:-.005em;text-transform:uppercase;
          padding-bottom:8px;border-bottom:2px solid var(--ink);margin-bottom:0;
          display:flex;align-items:baseline;gap:8px;}
.panel h3 .hn{font-family:var(--mono);font-size:11px;color:var(--red);font-weight:700;}
table{width:100%;border-collapse:collapse;font-size:12.5px;}
th,td{text-align:left;padding:9px 12px 9px 0;border-bottom:1px solid var(--rule);vertical-align:top;}
th{font-family:var(--mono);font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-3);font-weight:700;}
tr:last-child td{border-bottom:none;}
.skip{list-style:none;}
.skip li{padding:9px 0 9px 64px;position:relative;border-bottom:1px solid var(--rule);font-size:13px;line-height:1.5;}
.skip li:last-child{border-bottom:none;}
.skip li::before{content:"AVOID";position:absolute;left:0;top:9px;font-family:var(--mono);font-size:9.5px;
                 font-weight:700;letter-spacing:.06em;color:var(--red);}
.skip b{font-weight:800;}

.foot{margin-top:32px;padding-top:12px;border-top:2px solid var(--ink);
      font-family:var(--mono);font-size:10.5px;line-height:1.7;color:var(--ink-3);letter-spacing:.02em;}
.foot b{color:var(--ink);font-weight:700;}

/* ============ Print ============ */
@media print{
  body{padding:0;font-size:11px;}
  .wrap{max-width:none;}
  .stop,.zone,.panel,.districtmap,.arrival{break-inside:avoid;}
  a{border:none;}
  .ph{filter:none;}
}


.tabbar{position:sticky;top:0;z-index:20;display:flex;gap:0;flex-wrap:wrap;
  background:#fff;border-bottom:2px solid var(--ink);}
.tab{font-family:var(--mono);font-size:13px;font-weight:700;letter-spacing:.06em;padding:12px 20px;cursor:pointer;
  border:0;border-right:1px solid var(--rule);background:#fff;color:var(--ink-3);text-transform:uppercase;}
.tab.on{background:var(--ink);color:#fff;}
.tab:hover{color:var(--red);}
.tab.on:hover{color:#fff;}
.panelpage{display:none;}.panelpage.on{display:block;}
body{padding:0;}
.panelpage .wrap{padding:24px 20px 64px;}

</style>
</head>

<script>/* route-map.b.render.js — Müller-Brockmann (Design System B) renderer.
   Same data schema as route-map.render.js; Swiss markup (big numerals, mono
   labels, hairlines, single red accent). No emoji. Korean only in Naver link.
   New vs A: D.arrival[] transport ribbon rendered before the timeline. */
function renderRouteMapB(D, root) {
  if (!D || !root) return;

  const CATLABEL = {
    eat:'食', dinner:'晚餐', cafe:'咖啡', shop:'購', see:'體驗', experience:'體驗',
    aquarium:'水族', catcafe:'貓', handcraft:'手作', arcade:'夾娃娃', night:'宵夜'
  };
  const esc = s => (s==null?'':String(s)).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
  const has = s => s && String(s).trim().length;
  const seg = (lbl,html) => `<div class="seg"><span class="lbl">${lbl}</span>${html}</div>`;

  let h = '';

  // —— Masthead ——
  const num = (D.day||'').replace(/[^0-9]/g,'').padStart(2,'0') || '00';
  h += `<div class="kicker">Seoul Family Trip / ${esc(D.day)} / 動線圖</div>`;
  h += `<div class="masthead"><div class="daynum">${esc(num)}</div><div class="h-main">`;
  h += `<div class="title">${esc(D.title_zh||'')}</div>`;
  h += `<div class="sub">${esc(D.date||'')}　·　${esc(D.line_concept||'')}</div>`;
  h += `</div></div>`;
  h += `<div class="rule"></div>`;

  if (has(D.crit))   h += `<div class="callout crit"><span class="ct">Critical</span><span class="cv">${esc(D.crit)}</span></div>`;
  if (has(D.banner)) h += `<div class="callout info"><span class="ct">Transport</span><span class="cv">${esc(D.banner)}</span></div>`;

  // —— Arrival / transport ribbon ——
  if ((D.arrival||[]).length) {
    h += `<div class="arrival"><div class="alabel">${esc(D.arrival_label||'Arrival · 抵港動線')}</div><div class="arow">`;
    D.arrival.forEach(a => {
      h += `<div class="acell"><div class="an">${esc(a.n||'')}</div><div class="at">${esc(a.t||'')}${has(a.sub)?`<span>${esc(a.sub)}</span>`:''}</div></div>`;
    });
    h += `</div></div>`;
  }

  // —— Facts ——
  if (D.facts) {
    h += `<div class="facts">`;
    for (const k of Object.keys(D.facts))
      h += `<div class="fact"><div class="l">${esc(k)}</div><div class="v">${esc(D.facts[k])}</div></div>`;
    h += `</div>`;
  }

  // —— Legend (dot semantics only — Swiss = no zone rainbow) ——
  h += `<div class="legend">`;
  h += `<span class="lg"><span class="sw" style="background:var(--ink)"></span>必到</span>`;
  h += `<span class="lg"><span class="ring"></span>可選 / 可跳</span>`;
  h += `</div>`;

  // —— District map ——
  if (D.districtmap_svg) h += `<div class="districtmap">${D.districtmap_svg}</div>`;

  // —— Timeline ——
  h += `<div class="timeline">`;
  const zonesById = {};
  (D.zones||[]).forEach(z => zonesById[z.id] = z);
  const stops = (D.stops||[]).slice().sort((a,b)=>(a.order||0)-(b.order||0));
  let lastZone = null;
  stops.forEach((s, i) => {
    if (s.zone !== lastZone && zonesById[s.zone]) {
      const z = zonesById[s.zone];
      h += `<div class="zone"><span class="zt">${esc(z.name_zh)}</span>${has(z.note)?`<span class="zs">${esc(z.note)}</span>`:''}</div>`;
      lastZone = s.zone;
    }
    const clabel = CATLABEL[s.category] || '';
    const opt = s.optional ? ' opt' : '';
    h += `<div class="stop${opt}">`;
    h += `<div class="idx">${esc(s.order)}</div>`;
    h += `<div class="when">${has(s.time)?esc(s.time):''}${clabel?`<span class="cat${opt}">${esc(clabel)}</span>`:''}</div>`;
    h += `<div class="main">`;
    h += `<div class="nm">${esc(s.name_zh)}</div>`;
    if (has(s.usp)) h += `<div class="usp">${esc(s.usp)}</div>`;
    // meta rows
    let meta = '';
    if (has(s.hours))   meta += `<div class="mi"><span class="l">Hours</span><span>${esc(s.hours)}</span></div>`;
    if (has(s.price_krw)) meta += `<div class="mi"><span class="l">KRW</span><span><b>${esc(s.price_krw)}</b>${has(s.price_hkd)?` (${esc(s.price_hkd)})`:''}</span></div>`;
    if (has(s.address_full)) meta += `<div class="mi"><span class="l">Addr</span><span>${esc(s.address_full)}</span></div>`;
    if (has(s.reservation)) meta += `<div class="mi"><span class="l">Book</span><span><span class="resv">需訂</span> ${esc(s.reservation)}</span></div>`;
    if (meta) h += `<div class="meta">${meta}</div>`;
    if (has(s.naver_url)) h += `<div class="nav"><a href="${esc(s.naver_url)}" target="_blank" rel="noopener">Naver 導航</a></div>`;
    (s.reco_links||[]).forEach(r => {
      if (!r) return;
      h += `<div class="quote">「${esc(r.quote)}」<span class="src">— ${esc(r.handle||r.source||'網絡推薦')}${has(r.url)?` · <a href="${esc(r.url)}" target="_blank" rel="noopener">原文</a>`:''}</span></div>`;
    });
    if (has(s.walk_from_prev) || has(s.see_along_walk)) {
      let w = '';
      if (has(s.walk_from_prev)) w += `${esc(s.walk_from_prev)}${has(s.walk_minutes)?`（約 ${esc(s.walk_minutes)} 分）`:''}`;
      if (has(s.see_along_walk)) w += `${has(s.walk_from_prev)?'<br>':''}<span class="lbl">See</span>${esc(s.see_along_walk)}`;
      h += seg('Walk', w);
    }
    if (has(s.tips)) h += seg('Tip', esc(s.tips));
    if (has(s.nearby_detour)) h += seg('Near', esc(s.nearby_detour));
    if (has(s.rain_backup)) h += seg('Rain', esc(s.rain_backup));
    if (has(s.mission)) h += `<div class="task"><span class="lbl">Mission</span>${esc(s.mission)}</div>`;
    h += `</div>`; // /main
    if (has(s.photo)) h += `<img class="ph" src="${esc(s.photo)}" alt="${esc(s.name_zh)}" loading="lazy">`;
    else h += `<div></div>`;
    h += `</div>`; // /stop
  });
  if (has(D.endnote)) h += `<div class="endnode"><div class="sq"></div><div class="et">${esc(D.endnote)}</div></div>`;
  h += `</div>`; // /timeline

  // —— Rain plan B ——
  if ((D.rain_plan_b||[]).length) {
    h += `<div class="panel"><h3><span class="hn">B/</span> 落雨備案路線</h3><table><tr><th style="width:42%">原站（戶外）</th><th>雨天室內替代</th></tr>`;
    D.rain_plan_b.forEach(r => h += `<tr><td><b>${esc(r.from)}</b></td><td>${esc(r.to)}</td></tr>`);
    h += `</table></div>`;
  }
  // —— Avoid ——
  if ((D.avoid||[]).length) {
    h += `<div class="panel"><h3><span class="hn">!/</span> 避雷</h3><ul class="skip">`;
    D.avoid.forEach(a => h += `<li><b>${esc(a.name)}</b>：${esc(a.why)}</li>`);
    h += `</ul></div>`;
  }
  // —— Foot ——
  h += `<div class="foot">資料 / 2025–26 中文 blog · IG influencer · Naver · 官方，逐項標 [verified 2026-06-19]　　匯率 / 1 HKD ≈ 195 KRW　　地圖 / 示意動線，實際導航開 Naver Map　　${esc(D.day)} · Seoul Family Trip 2026</div>`;

  root.innerHTML = h;
}
window.renderRouteMapB = renderRouteMapB;
if (window.TRIP_DATA) { var __r = document.getElementById('app'); if (__r) renderRouteMapB(window.TRIP_DATA, __r); }
</script>
<script>
(function(){
  var DAYS=["D0", "D1", "D2", "D3", "D4"];
  DAYS.forEach(function(d){ try{ window.renderRouteMapB(TRIP_ALL[d], document.getElementById('mount-'+d)); }catch(e){} });
  function show(t){
    document.querySelectorAll('.panelpage').forEach(function(p){p.classList.toggle('on',p.id==='page-'+t);});
    document.querySelectorAll('.tab').forEach(function(b){b.classList.toggle('on',b.dataset.tab===t);});
    window.scrollTo(0,0);
  }
  document.querySelectorAll('.tab').forEach(function(b){b.onclick=function(){show(b.dataset.tab);};});
  show('D0');
})();
</script>
</body>
</html>
