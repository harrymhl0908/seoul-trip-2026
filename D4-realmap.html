(D.streets||[]).forEach(st=>L.marker([st.lat,st.lon],{icon:L.divIcon({className:'',html:`<div class="st">${st.zh}</div>`,iconSize:[88,16],iconAnchor:[44,8]}),interactive:false,zIndexOffset:-200}).addTo(map));
if(all.length)map.fitBounds(L.latLngBounds(all).pad(0.15));
var meM=null,meLL=null,hd=null,watching=false;
function meIcon(h){var inner=(h==null)?'<div class="medot"></div>':'<div class="mecone" style="transform:rotate('+h+'deg)"></div><div class="medot"></div>';
 return L.divIcon({className:'',iconSize:[30,30],iconAnchor:[15,15],html:'<div class="mepos">'+inner+'</div>'});}
function meRender(){if(!meLL)return;if(meM)map.removeLayer(meM);meM=L.marker(meLL,{icon:meIcon(hd),zIndexOffset:1000,interactive:false}).addTo(map);}
function onOri(e){var h=(e.webkitCompassHeading!=null)?e.webkitCompassHeading:((e.absolute&&e.alpha!=null)?(360-e.alpha):null);if(h!=null){hd=h;meRender();}}
document.getElementById('loc').onclick=function(){
 if(typeof DeviceOrientationEvent!=='undefined'&&typeof DeviceOrientationEvent.requestPermission==='function'){
  DeviceOrientationEvent.requestPermission().then(function(p){if(p==='granted')window.addEventListener('deviceorientation',onOri,true);}).catch(function(){});}
 else if(window.DeviceOrientationEvent){window.addEventListener('deviceorientationabsolute',onOri,true);window.addEventListener('deviceorientation',onOri,true);}
 if(!navigator.geolocation){alert('此裝置不支援定位');return;}
 if(!watching){watching=true;
  navigator.geolocation.watchPosition(function(p){meLL=[p.coords.latitude,p.coords.longitude];
   if(hd==null&&p.coords.heading!=null&&!isNaN(p.coords.heading))hd=p.coords.heading;
   if(!meM)map.setView(meLL,16);meRender();},
   function(){alert('無法定位：請在 Safari 允許位置權限');},{enableHighAccuracy:true,maximumAge:1000,timeout:12000});}
 else if(meLL){map.setView(meLL,16);}};
</script></body></html>
